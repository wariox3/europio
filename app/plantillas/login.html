{% extends "base.html" %}
{% block title %}Ingreso · Soporte europio{% endblock %}
{% block content %}
<article style="max-width:420px;margin:3rem auto;">
  <hgroup>
    <h2>Panel de soporte</h2>
    <p>Ingresa con tu cuenta de asesor.</p>
  </hgroup>
  {% if error %}<p style="color:var(--pico-color-red-500)">{{ error }}</p>{% endif %}
  <form method="post" action="/panel/login">
    <label>Correo
      <input type="email" name="email" autocomplete="username" required>
    </label>
    <label>Contraseña
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit">Entrar</button>
  </form>
</article>
{% endblock %}
