{% extends "base.html" %}
{% block title %}Chats · Soporte europio{% endblock %}
{% block head %}
<style>
  html, body { height:100%; margin:0; }
  main.container { display:flex; flex-direction:column; height:100dvh; }
  main.container > h2 { margin:.4rem 0; }
  .wa { display:flex; flex:1; min-height:0; border:1px solid var(--pico-muted-border-color);
        border-radius:.5rem; overflow:hidden; margin-bottom:.5rem; }
  .wa-lista { width:320px; min-width:260px; border-right:1px solid var(--pico-muted-border-color); overflow-y:auto; }
  .wa-item { position:relative; display:block; padding:.6rem 2.4rem .6rem .8rem;
             border-bottom:1px solid var(--pico-muted-border-color); color:inherit; text-decoration:none; }
  .wa-item:hover { background:#f5f6f6; }
  .badge { position:absolute; right:.7rem; top:50%; transform:translateY(-50%); background:#25d366;
           color:#fff; border-radius:1rem; min-width:1.25rem; height:1.25rem; padding:0 .35rem;
           font-size:.7rem; display:inline-flex; align-items:center; justify-content:center; }
  .wa-item .tit { font-weight:600; }
  .wa-item .prev { font-size:.8rem; color:var(--pico-muted-color); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .wa-chat { flex:1; display:flex; flex-direction:column; min-width:0; }
  .dot { display:inline-block; width:.55rem; height:.55rem; border-radius:50%;
         background:var(--pico-color-green-500); margin-left:.35rem; vertical-align:middle; }
  .wa-msgs { flex:1; overflow-y:auto; padding:1rem; background:#efeae2; font-size:.85rem; }
  .b { display:inline-block; padding:.35rem .55rem; border-radius:.6rem; max-width:75%;
       color:#111; box-shadow:0 1px .5px rgba(0,0,0,.13); line-height:1.3; }
  .b-in { background:#ffffff; }          /* mensajes del cliente */
  .b-out { background:#d9fdd3; }         /* mensajes del bot / asesor */
  .b .txt { white-space:pre-wrap; overflow-wrap:anywhere; }   /* respeta los saltos de línea */
  .b .autor { display:block; font-size:.72rem; opacity:.8; margin-bottom:.05rem; }
  .b .hora { display:block; text-align:right; font-size:.65rem; opacity:.55; margin-top:.1rem; }
  .fecha-sep { display:inline-block; background:#ffffff; color:#54656f; padding:.15rem .7rem;
               border-radius:.6rem; font-size:.72rem; box-shadow:0 1px .5px rgba(0,0,0,.13); }
</style>
{% endblock %}
{% block content %}
<h2 style="margin-bottom:.5rem;">Chats</h2>
<div class="wa">
  <aside class="wa-lista" id="wa-lista"
         hx-get="/panel/lista" hx-trigger="every 10s" hx-target="#wa-lista" hx-swap="innerHTML">
    {% include "_lista.html" %}
  </aside>
  <section class="wa-chat" id="chat-panel">
    {% if chat %}
      {% include "_chat_panel.html" %}
    {% else %}
      <p style="margin:auto;color:var(--pico-muted-color);">Selecciona un chat de la izquierda.</p>
    {% endif %}
  </section>
</div>

<script>
  function alFondo() {
    var m = document.getElementById('wa-msgs');
    if (m) m.scrollTop = m.scrollHeight;
  }
  document.addEventListener('DOMContentLoaded', alFondo);

  // Antes de refrescar los mensajes, recuerda si el asesor estaba abajo y su posición.
  document.body.addEventListener('htmx:beforeSwap', function (e) {
    var m = document.getElementById('wa-msgs');
    if (m && e.detail.target === m) {
      window.__wa = { pos: m.scrollTop, abajo: (m.scrollHeight - m.scrollTop - m.clientHeight) < 120 };
    } else {
      window.__wa = null;
    }
  });

  document.body.addEventListener('htmx:afterSettle', function (e) {
    var t = e.detail.target;
    if (t && t.id === 'chat-panel') { alFondo(); return; }   // abrió un chat o envió/cerró
    if (t && t.id === 'wa-msgs') {                            // refresco en vivo de mensajes
      var m = document.getElementById('wa-msgs');
      if (m && window.__wa) m.scrollTop = window.__wa.abajo ? m.scrollHeight : window.__wa.pos;
    }
  });
</script>
{% endblock %}
